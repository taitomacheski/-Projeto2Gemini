<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia de Segurança Digital - Navegue Seguro</title>
  <style>
    /* ==========================================
       1. VARIÁVEIS E CONFIGURAÇÕES DE CORES
       ========================================== */
    :root {
      /* Cores Padrão - Paleta Suave e Confortável */
      --bg-principal: #fbf9f6;      /* Off-white quente, reduz o cansaço visual */
      --bg-card: #ffffff;           /* Fundo dos cartões */
      --texto-principal: #2b2520;   /* Grafite escuro para ótima leitura */
      --texto-secundario: #5c534c;  /* Cinza médio para textos secundários */
      --cor-primaria: #0d5cb3;       /* Azul acessível para links e destaques */
      --cor-primaria-hover: #083d7a; /* Azul mais escuro ao passar o mouse */
      --cor-sucesso: #1e7e34;        /* Verde para acertos e segurança */
      --cor-alerta: #bd362f;         /* Vermelho para avisos importantes */
      --cor-alerta-fundo: rgba(189, 54, 47, 0.08);
      --borda: #dbd3cb;              /* Linhas divisórias suaves */
      --banner-fundo: #e6f0fa;      /* Fundo suave para o banner inicial */
      
      /* Tipografia */
      --fonte-familia: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --tamanho-base: 1.25rem;       /* 20px - Ideal para leitura de idosos */
      --espacamento-foco: 4px solid #ff9900; /* Destaque de teclado muito visível */
    }
